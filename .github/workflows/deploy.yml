name: Snowflake CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs

      - name: Deploy SQL
        env:
          SNOWFLAKE_CONNECTIONS_MYCONN_ACCOUNT: ${{ secrets.ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_MYCONN_USER: ${{ secrets.USER }}
          SNOWFLAKE_CONNECTIONS_MYCONN_PASSWORD: ${{ secrets.PASSWORD }}
          SNOWFLAKE_CONNECTIONS_MYCONN_WAREHOUSE: ${{ secrets.WAREHOUSE }}
          SNOWFLAKE_CONNECTIONS_MYCONN_DATABASE: ${{ secrets.DATABASE }}
          SNOWFLAKE_CONNECTIONS_MYCONN_SCHEMA: ${{ secrets.SCHEMA }}
          SNOWFLAKE_CONNECTIONS_MYCONN_ROLE: ${{ secrets.ROLE }}
        run: |
          snow connection list
          # snow connection test --connection myconn
          # snow run deploy_all --connection myconn

