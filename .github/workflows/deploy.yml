name: Snowflake CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Snowflake CLI
        run: pip install --upgrade snowflake-cli-labs

      # ✅ tạo connection 1 lần duy nhất
      - name: Create connection
        run: |
          snow connection add \
            --connection-name myconn \
            --account "${{ secrets.ACCOUNT }}" \
            --user "${{ secrets.USER }}" \
            --password "${{ secrets.PASSWORD }}" \
            --warehouse "${{ secrets.WAREHOUSE }}" \
            --database "${{ secrets.DATABASE }}" \
            --schema "${{ secrets.SCHEMA }}" \
            --role "${{ secrets.ROLE }}" \
            --no-interactive

      # ✅ debug bắt buộc
      - name: Debug connection
        run: |
          snow connection list
          snow connection test --connection myconn

      # ✅ deploy
      - name: Deploy SQL
        run: |
          snow run deploy_all --connection myconn